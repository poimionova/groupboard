name: CI/CD GroupBoard

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: sqlite+aiosqlite:///./test.db
      SECRET_KEY: test-secret-key-for-ci-only
      UPLOAD_DIR: /tmp/uploads

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install aiosqlite pytest-asyncio httpx

      - name: Run linter (ruff)
        run: |
          pip install ruff
          ruff check app/ --select E,W,F --ignore E501

      - name: Run tests
        run: pytest tests/ -v --tb=short

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit --skipLibCheck

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-lint]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t groupboard-backend ./backend

      - name: Build frontend image
        run: docker build -t groupboard-frontend ./frontend

      - name: Create release tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "Build successful on $(date)" >> build.log
